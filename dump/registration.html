<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="registration.css">
    <title>Sign Up</title>
</head>
<body>
    <div class="form-container">
        <form id="signup" action="process_registration.php" method="POST" class="form">
    
            <!-- Personal Details Section -->
            <div class="form-section">
                <h3>Personal Details</h3>
                <div class="row">
                    <div class="col-md input-field">
                        <input type="text" class="form-control" id="firstname" name="firstname" placeholder="First Name">
                        <small></small>
                    </div>
                    <div class="col-md input-field">
                        <input type="text" class="form-control" id="middlename" name="middlename" placeholder="Middle Initial(Optional)">
                        <small></small>
                    </div>
                    <div class="col-md input-field">
                        <input type="text" class="form-control" id="lastname" name="lastname" placeholder="Last Name">
                        <small></small>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md input-field">
                        <input type="text" class="form-control" id="exname" name="exname" placeholder="Ex. Name(Optional)">
                        <small></small>
                    </div>
                    <div class="col-md input-field">
                        <input type="text" class="form-control" id="email" name="email" placeholder="Email">
                        <small></small>
                    </div>
                    <div class="col-md input-field">
                        <select class="form-select" id="sex" name="sex">
                            <option selected disabled>Select Sex</option>
                            <option value="female">Female</option>
                            <option value="male">Male</option>
                        </select>
                        <small></small>
                    </div>
                </div>
            </div>
    
            <!-- Address Section -->
            <div class="form-section">
                <h3>Address</h3>
                <div class="row">
                    <div class="col-md input-field">
                        <input type="text" class="form-control" id="purok" name="purok" placeholder="Purok/Street">
                        <small></small>
                    </div>
                    <div class="col-md input-field">
                        <input type="text" class="form-control" id="barangay" name="barangay" placeholder="Barangay">
                        <small></small>
                    </div>
                    <div class="col-md input-field">
                        <input type="text" class="form-control" id="city" name="city" placeholder="Municipality/City">
                        <small></small>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md input-field">
                        <input type="text" class="form-control" id="province" name="province" placeholder="Province">
                        <small></small>
                    </div>
                    <div class="col-md input-field">
                        <input type="text" class="form-control" id="country" name="country" placeholder="Country">
                        <small></small>
                    </div>
                    <div class="col-md input-field">
                        <input type="text" class="form-control" id="zipcode" name="zipcode" placeholder="Zip Code">
                        <small></small>
                    </div>
                </div>
            </div>
    
            <!-- Account Section -->
            <div class="form-section">
                <h3>Account Confirmation</h3>
                <div class="row">
                    <div class="col-md input-field">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Username">
                        <small></small>
                    </div>
                    <div class="col-md input-field">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password">
                        <small></small>
                    </div>
                    <div class="col-md input-field">
                        <input type="password" class="form-control" id="repassword" name="repassword" placeholder="Re-enter Password">
                        <small></small>
                    </div>
                </div>
            </div>
    
            <div class="submit-button-container">
                <div class="sign-in">
                    <p>Already have an account? <a href="log-in.html">Sign In</a></p>
                </div>
                <input type="submit"  value="Sign Up" class="custom-btn">
            </div>
    
        </form>
    </div>
 
    <script src="validation.js"></script>

              }
      </script> -->
</body>
</html>
