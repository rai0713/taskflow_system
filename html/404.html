<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Page Not Found</title>

  <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/components/toast.css" />
  <link rel="stylesheet" href="/css/pages/404.css" />
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <div class="d-flex align-items-center gap-3 mb-3">
              <img src="/assets/logo.png" alt="TaskFlow" width="48" height="48" />
              <div>
                <h1 class="h4 m-0">Page not found</h1>
                <p class="text-muted m-0">404</p>
              </div>
            </div>

            <p class="mb-4">The page you’re looking for doesn’t exist or was moved.</p>

            <div class="d-flex gap-2 flex-wrap">
              <a class="btn btn-primary" href="/">Go to Home</a>
              <a class="btn btn-outline-secondary" href="/html/index.html">Go to Login</a>
            </div>

            <hr class="my-4" />
            <p class="text-muted small mb-0">If you typed the URL manually, check the spelling.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/js/components/toast.js"></script>
</body>
</html>
